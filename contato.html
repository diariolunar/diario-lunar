<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Sugestão de Pauta - Diário Lunar</title>

  <link rel="icon" href="/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/favicon.png">

  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/public.css">
</head>

<body>
  <div id="navbar"></div>

  <main>
    <section class="container section">
      <p style="color: var(--azul); font-weight: bold;">
        ✦ Diário Lunar
      </p>

      <h1 style="font-size: 48px;">
        Envie uma sugestão de pauta
      </h1>

      <p>
        Tem uma ideia, notícia, obra, autor ou assunto interessante para o Diário Lunar?
        Envie sua sugestão para a equipe.
      </p>

      <div class="contato-card">
        <div class="form-grid">
          <div class="form-public-group">
            <label>Seu nome</label>
            <input id="nomeContato" type="text" placeholder="Digite seu nome">
          </div>

          <div class="form-public-group">
            <label>Seu e-mail ou user</label>
            <input id="contatoContato" type="text" placeholder="E-mail, Wattpad ou Instagram">
          </div>
        </div>

        <div class="form-public-group">
          <label>Assunto</label>
          <input id="assuntoContato" type="text" placeholder="Ex: sugestão de matéria, entrevista, evento...">
        </div>

        <div class="form-public-group">
          <label>Mensagem</label>
          <textarea id="mensagemContato" placeholder="Conte sua sugestão com detalhes..."></textarea>
        </div>

        <button id="enviarContatoBtn" class="btn btn-gradient">
          Enviar sugestão
        </button>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script type="module" src="/assets/js/pages/contato.js"></script>
</body>
</html>
